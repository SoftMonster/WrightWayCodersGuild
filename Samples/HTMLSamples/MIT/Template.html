<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Offline URL Directory Generator</title>

<style>

:root {
    --background:#101216;
    --surface:#191d24;
    --surface-hover:#242b35;
    --accent:#00d9ff;
    --text:#f5f7fa;
    --muted:#9da7b5;
    --border:rgba(255,255,255,.12);
    --radius:18px;
    --motion:.25s;
}


* {
    box-sizing:border-box;
}


body {

    margin:0;

    background:
    radial-gradient(
        circle at top,
        #1b2538,
        var(--background)
    );

    color:var(--text);

    font-family:
    system-ui,
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    sans-serif;

}


.container {

    width:min(1200px,95%);

    margin:auto;

    padding:30px 0 50px;

}



.generator {

    background:var(--surface);

    border:1px solid var(--border);

    border-radius:var(--radius);

    padding:25px;

    margin-bottom:35px;

}



textarea {

    width:100%;

    min-height:280px;

    padding:15px;

    resize:vertical;

    border-radius:14px;

    background:#080a0d;

    color:white;

    border:1px solid var(--border);

    font-family:monospace;

    font-size:14px;

}



button {

    margin-top:15px;

    padding:12px 24px;

    border:0;

    border-radius:999px;

    background:var(--accent);

    color:#001018;

    cursor:pointer;

    font-weight:bold;

}



.status {

    color:var(--muted);

    margin-top:12px;

}



header {

    text-align:center;

}



.filters {

    display:flex;

    flex-wrap:wrap;

    gap:10px;

    justify-content:center;

    margin:25px 0;

}



.filter {

    background:var(--surface);

    color:var(--text);

    border:1px solid var(--border);

}



.filter.active {

    background:var(--accent);

    color:#001018;

}



.grid {

    display:grid;

    grid-template-columns:
    repeat(
        auto-fit,
        minmax(280px,1fr)
    );

    gap:20px;

}



.card {

    background:var(--surface);

    color:inherit;

    text-decoration:none;

    padding:22px;

    border-radius:var(--radius);

    border:1px solid var(--border);

    transition:
    transform var(--motion),
    background var(--motion);

}



.card:hover {

    transform:translateY(-5px);

    background:var(--surface-hover);

}



.emoji {

    font-size:40px;

}



.card p {

    color:var(--muted);

}



.category {

    color:var(--accent);

    font-size:.85rem;

}



footer {

    text-align:center;

    margin-top:40px;

    color:var(--muted);

}

</style>

</head>


<body>


<div class="container">


<section class="generator">


<h2>
Offline Directory Generator
</h2>


<p>
Paste your tools array below.
</p>


<textarea id="dataInput"
placeholder="
[
 {
  id:1,
  emoji:'🔧',
  name:'Example',
  desc:'Example description',
  category:'Tools',
  url:'https://example.com'
 }
]
"></textarea>


<button id="generateBtn">
Generate
</button>


<div class="status" id="status"></div>


</section>



<header id="header"></header>


<div id="filters" class="filters"></div>


<div id="grid" class="grid"></div>


<footer id="footer"></footer>



</div>



<script>


let tools = [];

let activeCategory = "All";



function normalize(value){

    return String(value)
    .trim()
    .toLowerCase();

}



function cleanInput(input) {

    // normalize quotation marks
    input = input
        .replace(/[‘’]/g, "'")
        .replace(/[“”]/g, '"')
        .trim();


    // remove trailing commas
    input = input.replace(
        /,\s*([}\]])/g,
        "$1"
    );


    // convert desc key
    input = input.replace(
        /\bdesc\s*:/g,
        "description:"
    );


    // quote object keys
    input = input.replace(
        /([{,]\s*)([A-Za-z_$][\w$]*)\s*:/g,
        '$1"$2":'
    );


    // convert single quoted strings safely
    input = input.replace(
        /'([^']*)'/g,
        function(match, value){

            return '"' +
            value
            .replace(/"/g,'\\"')
            +
            '"';

        }
    );


    // add array wrapper if missing
    if(
        !input.startsWith("[")
    ){

        input =
        "[" +
        input +
        "]";

    }


    return input;

}



function validate(data){


    if(!Array.isArray(data))
        throw Error("Dataset must be an array");


    const fields=[
        "id",
        "emoji",
        "name",
        "description",
        "category",
        "url"
    ];


    data.forEach(item=>{

        fields.forEach(field=>{

            if(!(field in item)){

                throw Error(
                    "Missing field: "+field
                );

            }

        });

    });

}



function categories(){


    return [
        "All",
        ...new Set(
            tools.map(
                x=>normalize(x.category)
            )
        )
    ];

}



function sorted(){


    return [...tools].sort(
        (a,b)=>
        a.name.localeCompare(b.name)
    );

}



function render(){


    renderHeader();

    renderFilters();

    renderCards();

    renderFooter();

}



function renderHeader(){


    const h=
    document.getElementById("header");


    h.replaceChildren();


    let title=
    document.createElement("h1");


    title.textContent=
    "URL Directory";


    let count=
    document.createElement("p");


    count.textContent=
    `${tools.length} resources loaded`;


    h.append(
        title,
        count
    );

}



function renderFilters(){


    const box=
    document.getElementById("filters");


    box.replaceChildren();



    categories()
    .forEach(cat=>{


        let button=
        document.createElement("button");


        button.className="filter";


        button.textContent=cat;



        if(
            normalize(cat)
            ===
            normalize(activeCategory)
        ){

            button.classList.add(
                "active"
            );

        }



        button.onclick=()=>{

            activeCategory=cat;

            render();

        };


        box.appendChild(button);


    });

}



function renderCards(){


    const grid=
    document.getElementById("grid");


    grid.replaceChildren();



    let visible=
    sorted()
    .filter(item=>{


        if(activeCategory==="All")
            return true;


        return normalize(item.category)
        ===
        normalize(activeCategory);


    });



    visible.forEach(item=>{


        let card=
        document.createElement("a");


        card.className="card";

        card.href=item.url;

        card.target="_blank";



        let emoji=
        document.createElement("div");


        emoji.className="emoji";

        emoji.textContent=item.emoji;



        let name=
        document.createElement("h2");


        name.textContent=item.name;



        let desc=
        document.createElement("p");


        desc.textContent=item.description;



        let category=
        document.createElement("span");


        category.className="category";

        category.textContent=item.category;



        card.append(
            emoji,
            name,
            desc,
            category
        );


        grid.appendChild(card);


    });



}



function renderFooter(){


    document
    .getElementById("footer")
    .textContent=
    "Generated: "
    +
    new Date()
    .toLocaleString();

}



function generate(){


    const status=
    document.getElementById("status");


    try{


        let data=
        JSON.parse(
            cleanInput(
                document
                .getElementById("dataInput")
                .value
            )
        );


        validate(data);


        tools=data;


        activeCategory="All";


        render();


        status.textContent=
        `Loaded ${tools.length} items`;


    }

    catch(e){

        status.textContent=
        "Error: "+e.message;

    }


}



document
.getElementById("generateBtn")
.onclick=
generate;



render();


</script>


</body>
</html>
