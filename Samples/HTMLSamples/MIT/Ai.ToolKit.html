        const categories = [...new Set(tools.map(t => t.category))].sort();
        let currentFilter = 'All';

        const controlsDiv = document.getElementById('controls');
        const allBtn = document.createElement('button');
        allBtn.textContent = 'All Tools';
        allBtn.className = 'active';
        allBtn.onclick = () => filterTools('All');
        controlsDiv.appendChild(allBtn);

        categories.forEach(cat => {
          const btn = document.createElement('button');
          btn.textContent = cat;
          btn.onclick = () => filterTools(cat);
          controlsDiv.appendChild(btn);
        });

        function filterTools(category) {
          currentFilter = category;
          const grid = document.getElementById('grid');
          grid.innerHTML = '';

          const filtered = category === 'All' ? tools : tools.filter(t => t.category === category);
          
          const countDiv = document.getElementById('count');
          countDiv.textContent = `Showing ${filtered.length} tools`;

          filtered.forEach(tool => {
            const card = document.createElement('a');
            card.className = 'card';
            card.href = tool.url;
            card.target = '_blank';
            card.rel = 'noopener noreferrer';

            card.innerHTML = `
              <div class="emoji">${tool.emoji}</div>
              <div class="info">
                <div class="number">#${tool.id}</div>
                <div class="name">${tool.name}</div>
                <div class="desc">${tool.desc}</div>
                <div class="category-tag">${tool.category}</div>
              </div>
            `;

            grid.appendChild(card);
          });
        }

        // Update buttons on filter
        function updateButtons(category) {
          document.querySelectorAll('button').forEach(btn => {
            btn.classList.remove('active');
            if (btn.textContent === category || (category === 'All' && btn.textContent === 'All Tools')) {
              btn.classList.add('active');
            }
          });
        }

        // Override filterTools to update buttons
        const originalFilter = filterTools;
        filterTools = function(category) {
          updateButtons(category === 'All' ? 'All Tools' : category);
          originalFilter(category);
        };

        // Initialize
        filterTools('All');
    </script>
