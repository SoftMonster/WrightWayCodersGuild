        .grid {

            gap: 20px;
        }

        .card {

            border: 2px solid #00d4ff;
            border-radius: 12px;
            padding: 25px;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .card:hover::before {
            left: 100%;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(0, 212, 255, 0.3);
            border-color: #00ffff;
        }

        .emoji {
            font-size: 3.5em;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 12px;
            filter: drop-shadow(0 0 8px rgba(0, 212, 255, 0.3));
        }

        .info {
            position: relative;
            z-index: 1;
        }

        .number {
            font-size: 0.85em;
            color: #00d4ff;
            font-weight: 600;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;

            font-weight: 700;
            margin-bottom: 10px;
            color: #ffffff;
        }

        .desc {

            line-height: 1.5;

            border: 2px solid #00d4ff;

            color: #00d4ff;
            font-weight: 700;
        }

        .stats-label {
            color: #b0b0b0;
            margin-top: 5px;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {

        }

        .no-results {

        const categories = [...new Set(tools.map(t => t.category))].sort();
        let activeCategory = 'all';

        const controls = document.getElementById('controls');
        const content = document.getElementById('content');

        // Create category buttons
        const allBtn = document.createElement('button');
        allBtn.className = 'category-btn active';
        allBtn.textContent = 'All Tools';
        allBtn.onclick = () => filterCategory('all');
        controls.appendChild(allBtn);

        categories.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = 'category-btn';
            btn.textContent = cat;
            btn.onclick = () => filterCategory(cat);
            controls.appendChild(btn);
        });

        function filterCategory(category) {
            activeCategory = category;
            const buttons = document.querySelectorAll('.category-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderTools();
        }

        function renderTools() {
            content.innerHTML = '';

            if (activeCategory === 'all') {
                categories.forEach(category => {
                    const categoryTools = tools.filter(t => t.category === category);
                    renderCategory(category, categoryTools);
                });
            } else {
                const categoryTools = tools.filter(t => t.category === activeCategory);
                renderCategory(activeCategory, categoryTools);
            }
        }

        function renderCategory(category, categoryTools) {
            const section = document.createElement('div');
            section.className = 'category-section';

            const title = document.createElement('h2');
            title.className = 'category-title';
            title.textContent = category;
            section.appendChild(title);

            const grid = document.createElement('div');
            grid.className = 'grid';

            categoryTools.forEach(tool => {
                const card = document.createElement('a');
                card.className = 'card';
                card.href = tool.url;
                card.target = '_blank';
                card.rel = 'noopener noreferrer';

                card.innerHTML = `
                    <div class="emoji">${tool.emoji}</div>
                    <div class="info">
                        <div class="number">#${tool.id}</div>
                        <div class="name">${tool.name}</div>
                        <div class="desc">${tool.desc}</div>
                    </div>
                `;

                grid.appendChild(card);
            });

            section.appendChild(grid);
            content.appendChild(section);
        }

        // Initial render
        renderTools();
    </script>
