<style>
:root{
    --bg:#0b1020;
    --bg2:#121a33;
    --surface:rgba(255,255,255,.06);
    --surface-hover:rgba(255,255,255,.12);
    --border:rgba(255,255,255,.12);
    --text:#f3f6ff;
    --muted:#aeb7d6;
    --accent:#6ee7ff;
    --accent-2:#8b5cf6;
    --radius:18px;
    --shadow:0 10px 30px rgba(0,0,0,.35);
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    color:var(--text);
    background:
        radial-gradient(circle at top left, rgba(110,231,255,.12), transparent 40%),
        radial-gradient(circle at top right, rgba(139,92,246,.12), transparent 40%),
        linear-gradient(180deg,var(--bg),var(--bg2));
    min-height:100vh;
}

.container{
    width:min(1400px,92vw);
    margin:0 auto;
    padding:40px 0 60px;
}

header{
    text-align:center;
    margin-bottom:32px;
}

h1{
    margin:0;
    font-size:clamp(2rem,4vw,3.2rem);
    letter-spacing:.03em;
}

.subtitle{
    margin-top:12px;
    color:var(--muted);
    font-size:1rem;
}

.toolbar{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
    margin:28px 0;
}

.filter-btn{
    border:none;
    cursor:pointer;
    padding:10px 16px;
    border-radius:999px;
    background:var(--surface);
    color:var(--text);
    transition:.2s ease;
    backdrop-filter:blur(10px);
}

.filter-btn:hover{
    background:var(--surface-hover);
    transform:translateY(-1px);
}

.filter-btn.active{
    background:linear-gradient(135deg,var(--accent),var(--accent-2));
    color:#06111f;
    font-weight:700;
}

.count{
    text-align:center;
    color:var(--muted);
    margin-bottom:24px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:18px;
}

.card{
    display:flex;
    flex-direction:column;
    text-decoration:none;
    color:inherit;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:20px;
    min-height:210px;
    transition:.22s ease;
    box-shadow:var(--shadow);
    backdrop-filter:blur(12px);
}

.card:hover{
    transform:translateY(-4px);
    background:var(--surface-hover);
    border-color:rgba(110,231,255,.4);
}

.emoji{
    font-size:2rem;
    margin-bottom:12px;
}

.name{
    font-size:1.15rem;
    font-weight:700;
    margin-bottom:10px;
}

.description{
    color:var(--muted);
    line-height:1.5;
    flex:1;
}

.category{
    margin-top:16px;
    display:inline-flex;
    align-self:flex-start;
    padding:6px 10px;
    border-radius:999px;
    font-size:.8rem;
    background:rgba(110,231,255,.12);
    border:1px solid rgba(110,231,255,.18);
}

footer{
    text-align:center;
    color:var(--muted);
    margin-top:40px;
    font-size:.9rem;
}

@media (max-width:640px){
    .card{
        min-height:auto;
    }
}
</style>

document.addEventListener("DOMContentLoaded", () => {

const app = document.getElementById("app");

const sortedTools = [...tools].sort((a,b)=>
    a.name.localeCompare(b.name,undefined,{sensitivity:"base"})
);

const categoryMap = new Map();

sortedTools.forEach(tool=>{
    const key = tool.category.trim().toLowerCase();
    if(!categoryMap.has(key)){
        categoryMap.set(key, tool.category.trim());
    }
});

const categories = [
    "All",
    ...Array.from(categoryMap.values()).sort((a,b)=>
        a.localeCompare(b,undefined,{sensitivity:"base"})
    )
];

let activeCategory = "All";

const container = document.createElement("div");
container.className = "container";

const header = document.createElement("header");

const title = document.createElement("h1");
title.textContent = "🎮 Idle Games Directory";

const subtitle = document.createElement("div");
subtitle.className = "subtitle";
subtitle.textContent = `${sortedTools.length} resources available`;

header.appendChild(title);
header.appendChild(subtitle);

const toolbar = document.createElement("div");
toolbar.className = "toolbar";

const count = document.createElement("div");
count.className = "count";

const grid = document.createElement("div");
grid.className = "grid";

const footer = document.createElement("footer");
footer.textContent =
    `Generated: ${new Date().toLocaleString()}`;

function renderCards(){

    grid.innerHTML = "";

    const filtered = sortedTools.filter(item => {
        if(activeCategory === "All") return true;
        return item.category.toLowerCase() === activeCategory.toLowerCase();
    });

    count.textContent =
        `${filtered.length} item${filtered.length===1?"":"s"} displayed`;

    filtered.forEach(item => {

        const card = document.createElement("a");
        card.className = "card";
        card.href = item.url;
        card.target = "_blank";
        card.rel = "noopener noreferrer";

        const emoji = document.createElement("div");
        emoji.className = "emoji";
        emoji.textContent = item.emoji;

        const name = document.createElement("div");
        name.className = "name";
        name.textContent = item.name;

        const desc = document.createElement("div");
        desc.className = "description";
        desc.textContent = item.description;

        const category = document.createElement("div");
        category.className = "category";
        category.textContent = item.category;

        card.appendChild(emoji);
        card.appendChild(name);
        card.appendChild(desc);
        card.appendChild(category);

        grid.appendChild(card);
    });
}

function renderFilters(){

    toolbar.innerHTML = "";

    categories.forEach(cat => {

        const btn = document.createElement("button");
        btn.className = "filter-btn";
        btn.textContent = cat;

        if(cat === activeCategory){
            btn.classList.add("active");
        }

        btn.addEventListener("click", () => {
            activeCategory = cat;
            renderFilters();
            renderCards();
        });

        toolbar.appendChild(btn);
    });
}

container.appendChild(header);
container.appendChild(toolbar);
container.appendChild(count);
container.appendChild(grid);
container.appendChild(footer);

app.appendChild(container);

renderFilters();
renderCards();

});
