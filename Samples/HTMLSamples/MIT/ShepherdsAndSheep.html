  padding:16px;

function renderFilters(){
  const root = document.getElementById("filters");

    const btn = document.createElement("div");

    btn.className = "filter" + (active === cat ? " active" : "");

    btn.textContent = cat;

    btn.onclick = () => {
      active = cat;
      render();
    };

    root.appendChild(btn);
  });
}

      🧠🐑 Maintain consistency in routine tasks<br>
      🔁🐑 Sustain responsibility in repetition<br>
      🧭🐑 Treat ordinary work as meaningful<br>
      🤝🐑 Avoid neglect during mundane states<br>
      ⚖️🐑 Stay reliable under low visibility<br>
      <br>
      🌾🐑 Stay attentive even in quiet moments. “Shepherds living out in the fields nearby…” (Luke 2:8)<br>
      👀🐑 Maintain vigilance in low activity states<br>
      🧠🐑 Do not disengage during quiet periods<br>
      🔁🐑 Stay receptive to unexpected signals<br>
      🧭🐑 Monitor environment consistently<br>
      ⚖️🐑 Remain prepared for interruption<br>

      <hr />
    `;
    grid.appendChild(banner);
  }

  filtered.forEach(t => {

    const query = encodeURIComponent(t.ref + " audio");

    const card = document.createElement("a");

    card.className = "card";
    card.href = `https://www.youtube.com/results?search_query=${query}`;
    card.target = "_blank";

    card.innerHTML = `
      <div class="top">
        <div class="emoji">${t.emoji}</div>
        <div>
          <div class="name">${t.name}</div>
          <div class="category">${t.category}</div>
        </div>
      </div>

      <div class="desc">${t.desc}</div>

      <div class="ref">📖 ${t.ref}</div>

      <div class="scripture">
        “${t.quote}”
      </div>
    `;

    grid.appendChild(card);
  });

  document.getElementById("count").textContent =
    `Core nodes: ${filtered.length} | Expanded nodes: ${dynamicCards.length}`;
}

/* ======================================
   DYNAMIC YOUTUBE API CARDS
====================================== */

function buildDynamicCards(){

  dynamicCards = [];

  tools.forEach(tool => {

    tool.searches.forEach(search => {

      const query = encodeURIComponent(search);

      dynamicCards.push({
        title: search,
        desc: `Exploration node generated from scripture query: ${search}`,
        thumb: "https://dummyimage.com/640x360/1a2230/7cc4ff.png&text=%F0%9F%8E%A7+Scripture+Audio",
        channel: "YouTube Search",
        category: tool.category,
        scripture: tool.ref,
        quote: tool.quote,
        video: `https://www.youtube.com/results?search_query=${query}`
      });

    });

  });

  renderDynamicCards();
  renderCoreCards();
}


/* ======================================
   RENDER DYNAMIC CARDS
====================================== */

function renderDynamicCards(){

  const grid = document.getElementById("dynamicGrid");
  grid.innerHTML = "";

  let filtered = [...dynamicCards];

  if(active !== "All"){
    filtered = filtered.filter(x => x.category.toLowerCase() === active.toLowerCase());
  }

  filtered.forEach(cardData => {

    const card = document.createElement("a");

    card.className = "card dynamic";
    card.href = cardData.video;
    card.target = "_blank";

    card.innerHTML = `
      <div class="top">
        <div class="emoji">🎧</div>
        <div>
          <div class="name">${cardData.title}</div>
          <div class="category">${cardData.category}</div>
        </div>
      </div>

      <img class="thumb" src="${cardData.thumb}" alt="thumbnail">

      <div class="desc">
        ${cardData.desc || "YouTube scripture exploration node."}
      </div>

      <div class="meta">
        Channel: ${cardData.channel}
      </div>

      <div class="ref">
        📖 ${cardData.scripture}
      </div>

      <div class="scripture">
        “${cardData.quote}”
      </div>
    `;

    grid.appendChild(card);
  });
}

/* ======================================
   MAIN RENDER
====================================== */

function render(){

  renderFilters();
  renderCoreCards();
  renderDynamicCards();

  document.getElementById("subtitle").textContent =
    `Core scripture nodes + dynamically generated YouTube exploration nodes.`;

  document.getElementById("footer").textContent =
    "Generated: " + new Date().toLocaleString();
}

render();
buildDynamicCards();

</script>
