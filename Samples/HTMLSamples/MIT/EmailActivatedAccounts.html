:root{
  --bg:#0b0f14;
  --panel:#111826;
  --panel2:#0f1622;
  --text:#e6edf3;
  --muted:#9fb0c0;
  --accent:#7dd3fc;
  --border:#1f2a3a;
  --shadow:0 10px 30px rgba(0,0,0,.35);
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
  background:radial-gradient(circle at 20% 10%, #142033, var(--bg));
  color:var(--text);
}

header{
  padding:28px 20px 10px;
  text-align:center;
}

h1{
  margin:0;
  font-size:22px;
  letter-spacing:.5px;
}

#subtitle{
  margin-top:6px;
  color:var(--muted);
  font-size:13px;
}

#filterBar{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:8px;
  padding:14px 20px;
}

.filter{
  border:1px solid var(--border);
  background:var(--panel2);
  color:var(--text);
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
  cursor:pointer;
  transition:.2s;
}

.filter.active{
  border-color:var(--accent);
  box-shadow:0 0 0 2px rgba(125,211,252,.15);
}

#grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:14px;
  padding:18px;
  max-width:1200px;
  margin:0 auto;
}

.card{
  display:flex;
  gap:12px;
  padding:14px;
  border:1px solid var(--border);
  background:linear-gradient(180deg,var(--panel),var(--panel2));
  border-radius:14px;
  text-decoration:none;
  color:inherit;
  box-shadow:var(--shadow);
  transition:transform .15s ease, border-color .15s ease;
}

.card:hover{
  transform:translateY(-2px);
  border-color:var(--accent);
}

.emoji{
  font-size:24px;
  width:34px;
  height:34px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.meta{
  flex:1;
}

.name{
  font-weight:600;
  font-size:14px;
}

.desc{
  font-size:12px;
  color:var(--muted);
  margin-top:2px;
}

.tag{
  font-size:11px;
  margin-top:6px;
  color:var(--accent);
}

footer{
  text-align:center;
  padding:18px;
  font-size:11px;
  color:var(--muted);
}

#empty{
  text-align:center;
  color:var(--muted);
  padding:40px;
  display:none;
}
</style>

// -------- state --------
let activeCategory = "All";

// -------- helpers --------
function normalize(str){
  return str.toLowerCase().trim();
}

function getCategories(data){
  const set = new Set();
  data.forEach(d => set.add(normalize(d.category)));
  // Preserve nicer display casing by mapping back to first-seen original label
  const display = new Map();
  data.forEach(d => {
    const key = normalize(d.category);
    if(!display.has(key)) display.set(key, d.category);
  });
  return Array.from(set).map(key => display.get(key));
}

function sortByName(data){
  return data.slice().sort((a,b)=>a.name.localeCompare(b.name));
}

// -------- render --------
const grid = document.getElementById("grid");
const filterBar = document.getElementById("filterBar");
const subtitle = document.getElementById("subtitle");
const footer = document.getElementById("footer");
const empty = document.getElementById("empty");

function renderSubtitle(filtered){
  subtitle.textContent = `Total tools: ${tools.length} | Visible: ${filtered.length}`;
}

function renderFooter(){
  footer.textContent = "Rendered: " + new Date().toLocaleString();
}

function renderFilters(){
  filterBar.innerHTML = "";

  const cats = ["All", ...getCategories(tools).sort((a,b)=>a.localeCompare(b))];

  cats.forEach(cat=>{
    const btn = document.createElement("button");
    btn.className = "filter" + (normalize(activeCategory)===normalize(cat) ? " active" : "");
    btn.textContent = cat;

    btn.addEventListener("click", ()=>{
      activeCategory = cat;
      render();
    });

    filterBar.appendChild(btn);
  });
}

function renderGrid(data){
  grid.innerHTML = "";

  if(data.length === 0){
    empty.style.display = "block";
    return;
  }
  empty.style.display = "none";

  data.forEach(item=>{
    const a = document.createElement("a");
    a.className = "card";
    a.href = item.url;
    a.target = "_blank";
    a.rel = "noopener noreferrer";

    const emoji = document.createElement("div");
    emoji.className = "emoji";
    emoji.textContent = item.emoji;

    const meta = document.createElement("div");
    meta.className = "meta";

    const name = document.createElement("div");
    name.className = "name";
    name.textContent = item.name;

    const desc = document.createElement("div");
    desc.className = "desc";
    desc.textContent = item.desc; // FIX: was item.description (undefined property)

    const tag = document.createElement("div");
    tag.className = "tag";
    tag.textContent = item.category;

    meta.appendChild(name);
    meta.appendChild(desc);
    meta.appendChild(tag);

    a.appendChild(emoji);
    a.appendChild(meta);

    grid.appendChild(a);
  });
}

function render(){
  const sorted = sortByName(tools);

  const filtered = activeCategory === "All"
    ? sorted
    : sorted.filter(t => normalize(t.category) === normalize(activeCategory));

  renderFilters();
  renderGrid(filtered);
  renderSubtitle(filtered);
  renderFooter();
}

// deterministic initial render
window.addEventListener("DOMContentLoaded", render);
</script>
