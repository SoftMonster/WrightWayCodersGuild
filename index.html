<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MIT Samples File Browser</title>

<style>
    :root {
        --bg: #0f172a;
        --panel: #ffffff;
        --accent: #5c67f2;
        --text: #1f2937;
        --muted: #6b7280;
        --border: #e5e7eb;
    }

    body {
        margin: 0;
        font-family: system-ui, Arial, sans-serif;
        background: linear-gradient(135deg, #74ebd5, #9face6);
        color: var(--text);
        min-height: 100vh;
    }

    .container {
        max-width: 820px;
        margin: 40px auto;
        background: var(--panel);
        border-radius: 14px;
        padding: 28px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.12);
    }

    h1 {
        margin-top: 0;
        font-size: 2rem;
    }

    .clock {
        font-family: monospace;
        color: var(--muted);
        margin-bottom: 12px;
    }

    .search-container {
        display: flex;
        gap: 10px;
        margin: 14px 0 24px;
    }

    .search-container input {
        flex: 1;
        padding: 10px;
        border: 1px solid var(--border);
        border-radius: 8px;
    }

    .search-button {
        padding: 10px 14px;
        border: none;
        background: var(--accent);
        color: white;
        border-radius: 8px;
        cursor: pointer;
    }

    .search-button:hover {
        opacity: 0.9;
    }

    .section-title {
        margin-top: 24px;
        font-size: 1.1rem;
    }

    /* IMPORTANT FIX: removed inner scrolling container */
    ul#file-list {
        list-style: none;
        padding: 0;
        margin: 16px 0 0;
    }

    li.file-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 8px;
        border-bottom: 1px solid var(--border);
        gap: 10px;
    }

    .file-link {
        color: #0366d6;
        text-decoration: none;
        font-weight: 500;
    }

    .file-link:hover {
        text-decoration: underline;
    }

    .edit-link {
        font-size: 0.85rem;
        color: var(--accent);
        text-decoration: none;
        white-space: nowrap;
    }

    .edit-link:hover {
        text-decoration: underline;
    }

    #status {
        margin-top: 10px;
        color: var(--muted);
    }

    #status.error {
        color: red;
    }
</style>
</head>

<body>

<div class="container">

    <div class="clock" id="clock"></div>

    <h1>👋 Hello and Welcome</h1>

    <div class="search-container">
        <input id="searchInput" placeholder="Search Google..." />
        <button class="search-button" onclick="searchGoogle()">Search</button>
    </div>

    <p>This page dynamically lists MIT sample HTML files from GitHub.</p>

    <h2 class="section-title">📁 MIT Sample Files</h2>
    <div id="status">Loading files...</div>
    <ul id="file-list"></ul>

</div>

<script>
/* ---------------- CLOCK ---------------- */
function showTime() {
    const d = new Date();
    const pad = n => n < 10 ? "0" + n : n;

    document.getElementById("clock").textContent =
        `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;

    setTimeout(showTime, 1000);
}
showTime();

/* ---------------- SEARCH ---------------- */
function searchGoogle() {
    const q = document.getElementById("searchInput").value;
    window.open("https://www.google.com/search?q=" + encodeURIComponent(q), "_blank");
}

/* ---------------- GITHUB FILE LOADER ---------------- */
const owner = "SoftMonster";
const repo = "WrightWayCodersGuild";
const path = "Samples/HTMLSamples/MIT";

const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
const basePageUrl = `https://${owner.toLowerCase()}.github.io/${repo}/${path}/`;
const editBaseUrl = `https://github.com/${owner}/${repo}/edit/main/${path}/`;

const statusEl = document.getElementById("status");
const fileListEl = document.getElementById("file-list");

fetch(apiUrl)
.then(r => {
    if (!r.ok) throw new Error("GitHub API error: " + r.status);
    return r.json();
})
.then(files => {

    statusEl.style.display = "none";

    if (!Array.isArray(files) || files.length === 0) {
        statusEl.textContent = "No files found.";
        statusEl.style.display = "block";
        return;
    }

    files
        .filter(f => f.type === "file")
        .forEach(file => {

            const li = document.createElement("li");
            li.className = "file-item";

            const left = document.createElement("a");
            left.className = "file-link";
            left.href = basePageUrl + encodeURIComponent(file.name);
            left.target = "_blank";
            left.textContent = file.name;

            const edit = document.createElement("a");
            edit.className = "edit-link";
            edit.href = editBaseUrl + encodeURIComponent(file.name);
            edit.target = "_blank";
            edit.textContent = "✏️ edit";

            li.appendChild(left);
            li.appendChild(edit);
            fileListEl.appendChild(li);
        });

})
.catch(err => {
    statusEl.textContent = "Failed to load files: " + err.message;
    statusEl.className = "error";
});
</script>

</body>
</html>
